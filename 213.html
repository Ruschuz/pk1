<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poker Eye — AI Coach</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --green: #00ff88;
    --red: #ff3355;
    --yellow: #ffd700;
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0f0;
    --muted: #555577;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
  }

  .logo span { color: var(--text); }

  .badge {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--green);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 2px;
  }

  .camera-wrap {
    position: relative;
    margin: 16px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
    aspect-ratio: 4/3;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  .capture-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.6));
  }

  .corner-frame { position: absolute; width: 60px; height: 60px; }
  .corner-frame.tl { top: 16px; left: 16px; border-top: 2px solid var(--green); border-left: 2px solid var(--green); border-radius: 4px 0 0 0; }
  .corner-frame.tr { top: 16px; right: 16px; border-top: 2px solid var(--green); border-right: 2px solid var(--green); border-radius: 0 4px 0 0; }
  .corner-frame.bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--green); border-left: 2px solid var(--green); border-radius: 0 0 0 4px; }
  .corner-frame.br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--green); border-right: 2px solid var(--green); border-radius: 0 0 4px 0; }

  .btn-scan {
    background: var(--green);
    color: #000;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    padding: 14px 40px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 30px rgba(0,255,136,0.4);
  }

  .btn-scan:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
  .btn-scan:disabled { background: var(--muted); box-shadow: none; color: #333; cursor: not-allowed; }

  .start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--surface);
    cursor: pointer;
  }

  .start-icon { font-size: 48px; animation: pulse 2s infinite; }
  .start-text { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; text-align: center; padding: 0 20px; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.95); }
  }

  .context-panel {
    margin: 0 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .context-title { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

  .ctx-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .ctx-field { display: flex; flex-direction: column; gap: 5px; }

  .ctx-field label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .ctx-field input, .ctx-field select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .ctx-field input:focus, .ctx-field select:focus { border-color: var(--green); }
  .ctx-field select option { background: var(--surface); }

  /* WORKER URL CONFIG */
  .config-panel {
    margin: 0 16px 16px;
    background: rgba(255,215,0,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .config-title { font-size: 10px; letter-spacing: 2px; color: var(--yellow); text-transform: uppercase; margin-bottom: 8px; }

  .config-panel input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    outline: none;
  }

  .config-panel input:focus { border-color: var(--yellow); }
  .config-hint { font-size: 10px; color: var(--muted); margin-top: 6px; }

  .advice-panel {
    margin: 0 16px 16px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
  }

  .advice-panel.visible { display: block; }

  .advice-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .action-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    padding: 4px 16px;
    border-radius: 6px;
    line-height: 1;
  }

  .action-badge.FOLD { background: rgba(255,51,85,0.15); color: var(--red); border: 1px solid rgba(255,51,85,0.3); }
  .action-badge.CALL { background: rgba(255,215,0,0.12); color: var(--yellow); border: 1px solid rgba(255,215,0,0.3); }
  .action-badge.RAISE { background: rgba(0,255,136,0.12); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .action-badge.CHECK { background: rgba(100,100,255,0.12); color: #8888ff; border: 1px solid rgba(100,100,255,0.3); }
  .action-badge.THINK { background: rgba(200,200,200,0.1); color: var(--text); border: 1px solid var(--border); }

  .confidence-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .confidence-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; background: var(--green); }
  .confidence-label { font-size: 11px; color: var(--muted); }

  .advice-body { padding: 16px; background: var(--surface); }
  .advice-text { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }

  .snapshot-preview { margin: 0 16px 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); display: none; }
  .snapshot-preview.visible { display: block; }
  .snapshot-preview img { width: 100%; display: block; border-radius: 10px; }

  .loading { display: none; align-items: center; gap: 10px; padding: 16px; background: var(--surface); margin: 0 16px 16px; border-radius: 12px; border: 1px solid var(--border); }
  .loading.visible { display: flex; }

  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  .history-section { margin: 0 16px 80px; }
  .history-title { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

  .history-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; font-size: 12px; }
  .h-action { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; min-width: 50px; }
  .h-time { color: var(--muted); margin-left: auto; font-size: 10px; }

  .error-msg { margin: 0 16px 16px; padding: 14px; background: rgba(255,51,85,0.08); border: 1px solid rgba(255,51,85,0.25); border-radius: 10px; color: var(--red); font-size: 13px; line-height: 1.5; display: none; }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">POKER<span>EYE</span></div>
  <div class="badge">AI COACH</div>
</div>

<!-- WORKER URL CONFIG -->
<div class="config-panel">
  <div class="config-title">⚙ Worker URL</div>
  <input type="url" id="workerUrl" placeholder="https://poker-proxy.ТВОЙник.workers.dev" autocomplete="off" autocorrect="off" spellcheck="false">
  <div class="config-hint">Вставь ссылку на твой Cloudflare Worker</div>
</div>

<!-- CAMERA -->
<div class="camera-wrap" id="cameraWrap">
  <video id="video" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="canvas"></canvas>

  <div class="start-screen" id="startScreen" onclick="startCamera()">
    <div class="start-icon">📷</div>
    <div class="start-text">Нажми чтобы включить камеру</div>
  </div>

  <div class="capture-overlay" id="captureOverlay" style="display:none">
    <div class="corner-frame tl"></div>
    <div class="corner-frame tr"></div>
    <div class="corner-frame bl"></div>
    <div class="corner-frame br"></div>
    <button class="btn-scan" id="scanBtn" onclick="analyzeHand()">АНАЛИЗ</button>
  </div>
</div>

<!-- CONTEXT -->
<div class="context-panel">
  <div class="context-title">Контекст игры</div>
  <div class="ctx-row">
    <div class="ctx-field">
      <label>Позиция</label>
      <select id="ctxPosition">
        <option>UTG</option>
        <option>MP</option>
        <option>CO</option>
        <option selected>BTN</option>
        <option>SB</option>
        <option>BB</option>
      </select>
    </div>
    <div class="ctx-field">
      <label>Улица</label>
      <select id="ctxStreet">
        <option>Префлоп</option>
        <option>Флоп</option>
        <option>Тёрн</option>
        <option>Ривер</option>
      </select>
    </div>
  </div>
  <div class="ctx-row">
    <div class="ctx-field">
      <label>Мой стек</label>
      <input type="text" id="ctxStack" placeholder="100bb" value="100bb">
    </div>
    <div class="ctx-field">
      <label>Пот</label>
      <input type="text" id="ctxPot" placeholder="10bb">
    </div>
  </div>
  <div class="ctx-field">
    <label>Заметки</label>
    <input type="text" id="ctxNotes" placeholder="Оппонент тайтовый, 3 игрока...">
  </div>
</div>

<!-- SNAPSHOT -->
<div class="snapshot-preview" id="snapshotPreview">
  <img id="snapshotImg" src="" alt="snapshot">
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">CLAUDE АНАЛИЗИРУЕТ СТОЛ...</div>
</div>

<!-- ERROR -->
<div class="error-msg" id="errorMsg"></div>

<!-- ADVICE -->
<div class="advice-panel" id="advicePanel">
  <div class="advice-header">
    <div class="action-badge THINK" id="actionBadge">—</div>
    <div class="confidence-bar-wrap">
      <div class="confidence-bar" id="confidenceBar" style="width:0%"></div>
    </div>
    <div class="confidence-label" id="confidenceLabel">—</div>
  </div>
  <div class="advice-body">
    <div class="advice-text" id="adviceText"></div>
  </div>
</div>

<!-- HISTORY -->
<div class="history-section" id="historySection" style="display:none">
  <div class="history-title">История советов</div>
  <div id="historyList"></div>
</div>

<script>
let stream = null;
let history = [];

// Save/load worker URL
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('pokerWorkerUrl');
  if (saved) document.getElementById('workerUrl').value = saved;
});

document.getElementById('workerUrl').addEventListener('change', (e) => {
  localStorage.setItem('pokerWorkerUrl', e.target.value.trim());
});

async function startCamera() {
  try {
    // Try rear camera first, fallback to any camera
    let constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } }, audio: false };
    
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch {
      // Fallback: any camera
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    }

    const video = document.getElementById('video');
    video.srcObject = stream;

    // iPhone sometimes needs a kick
    video.onloadedmetadata = () => video.play().catch(() => {});

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('captureOverlay').style.display = 'flex';
  } catch (e) {
    showError('Нет доступа к камере.\n\nОткрой сайт в Safari на iPhone и разреши доступ к камере в настройках.');
  }
}

function captureFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // Resize to max 800px to keep request small and fast
  const MAX = 800;
  let w = video.videoWidth;
  let h = video.videoHeight;

  if (w > MAX || h > MAX) {
    if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
    else { w = Math.round(w * MAX / h); h = MAX; }
  }

  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);

  return canvas.toDataURL('image/jpeg', 0.82).split(',')[1];
}

async function analyzeHand() {
  const workerUrl = document.getElementById('workerUrl').value.trim();
  if (!workerUrl) {
    showError('Сначала вставь Worker URL в поле сверху.');
    return;
  }

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;

  const b64 = captureFrame();
  document.getElementById('snapshotImg').src = 'data:image/jpeg;base64,' + b64;
  document.getElementById('snapshotPreview').classList.add('visible');

  hideError();
  document.getElementById('advicePanel').classList.remove('visible');
  document.getElementById('loading').classList.add('visible');

  const position = document.getElementById('ctxPosition').value;
  const street = document.getElementById('ctxStreet').value;
  const stack = document.getElementById('ctxStack').value;
  const pot = document.getElementById('ctxPot').value;
  const notes = document.getElementById('ctxNotes').value;

  const systemPrompt = `Ты — профессиональный покерный коуч. Пользователь показывает фото стола из домашней игры на фишки. Анализируй карты, борд, позицию, размер пота. Давай чёткий практичный совет.

ФОРМАТ ОТВЕТА — строго JSON без markdown:
{
  "action": "FOLD" | "CALL" | "RAISE" | "CHECK" | "ALL-IN",
  "confidence": 0-100,
  "reasoning": "Объяснение на русском, 3-5 предложений. Что видишь на фото, почему такое решение, что учесть."
}

Отвечай ТОЛЬКО JSON.`;

  const userContent = `Контекст:
- Позиция: ${position}
- Улица: ${street}
- Мой стек: ${stack}
- Пот: ${pot || 'неизвестно'}
- Заметки: ${notes || 'нет'}

Проанализируй стол на фото и дай совет.`;

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 25000); // 25s timeout

    const response = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: userContent }
          ]
        }]
      })
    });

    clearTimeout(timeout);
    document.getElementById('loading').classList.remove('visible');

    if (!response.ok) {
      const errText = await response.text();
      showError(`Ошибка сервера ${response.status}: ${errText.substring(0, 200)}`);
      btn.disabled = false;
      return;
    }

    const data = await response.json();

    if (data.error) {
      showError('Ошибка API: ' + data.error.message);
      btn.disabled = false;
      return;
    }

    let rawText = data.content.map(i => i.text || '').join('');
    rawText = rawText.replace(/```json|```/g, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(rawText);
    } catch {
      parsed = { action: 'THINK', confidence: 50, reasoning: rawText };
    }

    showAdvice(parsed);
    addHistory(parsed);

  } catch (e) {
    document.getElementById('loading').classList.remove('visible');
    if (e.name === 'AbortError') {
      showError('Таймаут — Claude думал слишком долго. Попробуй ещё раз.');
    } else {
      showError('Ошибка соединения: ' + e.message + '\n\nПроверь Worker URL и интернет.');
    }
  }

  btn.disabled = false;
}

function showAdvice(parsed) {
  const panel = document.getElementById('advicePanel');
  const badge = document.getElementById('actionBadge');
  const bar = document.getElementById('confidenceBar');
  const label = document.getElementById('confidenceLabel');
  const text = document.getElementById('adviceText');

  const action = parsed.action || 'THINK';
  const conf = parsed.confidence || 50;

  badge.textContent = action;
  badge.className = 'action-badge ' + action;
  bar.style.width = conf + '%';

  const colors = { FOLD: '#ff3355', CALL: '#ffd700', RAISE: '#00ff88', CHECK: '#8888ff', 'ALL-IN': '#ff6600' };
  bar.style.background = colors[action] || '#00ff88';

  label.textContent = conf + '%';
  text.textContent = parsed.reasoning || '';
  panel.classList.add('visible');
}

function addHistory(parsed) {
  const now = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  history.unshift({ action: parsed.action, time: now, reasoning: parsed.reasoning });

  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';

  const colors = { FOLD: '#ff3355', CALL: '#ffd700', RAISE: '#00ff88', CHECK: '#8888ff', 'ALL-IN': '#ff6600' };
  list.innerHTML = history.slice(0, 5).map(h => `
    <div class="history-item">
      <div class="h-action" style="color:${colors[h.action] || '#fff'}">${h.action}</div>
      <div style="font-size:11px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(h.reasoning || '').substring(0, 60)}…</div>
      <div class="h-time">${h.time}</div>
    </div>
  `).join('');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}
</script>
</body>
</html>
